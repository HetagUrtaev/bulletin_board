{% extends 'flatpages/default.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3>Регистрация</h3>
                </div>
                <div class="card-body">
                    {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
            <label for="username" class="form-label">Имя пользователя</label>
            <input type="text" name="username" id="username" class="form-control" value="{{ username }}" required>
                </div>

                <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" name="email" id="email" class="form-control" value="{{ email }}" required>
                </div>

                <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" name="password" id="password" class="form-control" required>
                </div>

                <div class="mb-3">
            <label for="password2" class="form-label">Подтвердите пароль</label>
            <input type="password" name="password2" id="password2" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Получить код подтверждения</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
