<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Bare - Start Bootstrap Template</title>
        {% load static %}
        <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    </head>
    <body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark static-top">
    <div class="container">
        <!-- Левая часть -->
        <div class="navbar-header">
            <a class="navbar-brand" href="/">Доска объявлений</a>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        {% if not user.is_authenticated %}

            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'board:ad_list' %}">Все объявления</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Вход</a>
                    </li>
                </ul>
            </div>
        {% else %}

            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto"> <!-- ms-auto выравнивает элементы вправо -->
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'board:ad_list' %}">Все объявления</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ad/create">Добавить объявления</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/response/list">Отклики</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile/">Профиль</a>
                    </li>
                </ul>
            </div>
        {% endif %}
    </div>
</nav>
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    {% block content %}
                    {{ flatpage.content }}
                    {% endblock content %}
                </div>
            </div>
        </div>
    </body>
</html>
